name: CI Build Check

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    name: Lint, Typecheck, and Build
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter & Type Check
        run: npm run lint

      - name: Build Application
        run: npm run build
        env:
          # Inject a mock key so that Vite & esbuild build correctly if they validate keys
          GEMINI_API_KEY: "mock_key_for_ci_build"
