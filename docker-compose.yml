services:
  billing-suite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billing-suite
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"